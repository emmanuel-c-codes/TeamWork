<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity History | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideInUp 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-white px-5 pt-6 pb-4 sticky top-0 z-20 shadow-sm border-b border-slate-100">
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-wide">Activity Logs</h1>
        <p class="text-xs text-slate-400 font-medium">Track your incidents, recycling batches, and earnings</p>
    </header>

    <main class="p-5">
        <!-- Filter Tabs -->
        <div class="flex gap-2 overflow-x-auto pb-3 mb-4 no-scrollbar">
            <button id="tab-all" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-xs font-bold whitespace-nowrap transition-all">All Logs</button>
            <button id="tab-pending" class="px-4 py-2 rounded-xl bg-white border border-slate-100 text-slate-600 text-xs font-bold whitespace-nowrap transition-all">Pending</button>
            <button id="tab-resolved" class="px-4 py-2 rounded-xl bg-white border border-slate-100 text-slate-600 text-xs font-bold whitespace-nowrap transition-all">Resolved</button>
        </div>

        <!-- History Target Element -->
        <div id="extendedHistoryWrapper" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 min-h-[300px]">
            <div id="historyLoading" class="text-center py-12 text-slate-400 text-sm font-medium">
                Fetching records...
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around py-3.5 px-2 z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Home</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-bold mt-1">History</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Map</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let masterLogs = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadExtendedHistory(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadExtendedHistory(userId) {
            const container = document.getElementById("extendedHistoryWrapper");
            try {
                const reportsRef = collection(db, "reports");
                const q = query(reportsRef, where("userId", "==", userId));
                const snapshot = await getDocs(q);

                masterLogs = [];
                snapshot.forEach(doc => masterLogs.push({ id: doc.id, ...doc.data() }));

                renderLogs(masterLogs);
                setupFilters();
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-center text-xs font-bold text-red-500 py-8">Failed to compile histories.</p>`;
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById("extendedHistoryWrapper");
            if (logs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-slate-400 text-sm font-semibold">No transactions match this view</p>
                    </div>`;
                return;
            }

            container.innerHTML = logs.map(data => {
                let statusStyle = "bg-yellow-100 text-yellow-700 border-yellow-200";
                if (data.status === "resolved" || data.status === "paid") statusStyle = "bg-emerald-100 text-emerald-700 border-emerald-200";
                if (data.status === "rejected") statusStyle = "bg-red-100 text-red-700 border-red-200";

                let formattedDate = "Recent";
                if (data.createdAt?.toDate) {
                    formattedDate = data.createdAt.toDate().toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                }

                return `
                    <div class="flex gap-4 py-4 border-b border-slate-100 last:border-none animate-slide-up">
                        <div class="p-2.5 bg-slate-50 rounded-xl text-slate-500 h-fit border border-slate-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <h4 class="text-sm font-bold text-slate-800 truncate">${data.title || data.category || 'Environmental Entry'}</h4>
                                <span class="text-[9px] font-black px-2 py-0.5 rounded-full border uppercase tracking-wider ${statusStyle}">${data.status || 'Pending'}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-0.5">${data.location || 'Logged Geolocation'}</p>
                            <p class="text-[10px] text-slate-400 mt-2 font-medium">${formattedDate}</p>
                        </div>
                    </div>`;
            }).join('');
        }

        function setupFilters() {
            const tabs = ['all', 'pending', 'resolved'];
            tabs.forEach(type => {
                document.getElementById(`tab-${type}`).addEventListener('click', (e) => {
                    tabs.forEach(t => {
                        const btn = document.getElementById(`tab-${t}`);
                        btn.className = "px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all " + 
                            (t === type ? "bg-slate-900 text-white" : "bg-white border border-slate-100 text-slate-600");
                    });
                    
                    if (type === 'all') {
                        renderLogs(masterLogs);
                    } else {
                        const filtered = masterLogs.filter(l => (l.status || 'pending').toLowerCase() === type);
                        renderLogs(filtered);
                    }
                });
            });
        }
    </script>
</body>
</html>
