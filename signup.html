
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        
        /* Restricts the animation to a subtle 20px slide for a cohesive look */
        [data-aos="fade-up"] {
            transform: translate3d(0, 20px, 0) !important;
        }
        [data-aos="fade-up"].aos-animate {
            transform: translate3d(0, 0, 0) !important;
        }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">

    <!-- Top Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-4 md:px-8 py-4">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <span class="font-bold text-lg md:text-xl text-green-600">EcoMonitor</span>
        </div>
        <div class="flex items-center gap-3 md:gap-6 text-xs md:text-sm font-medium text-gray-600">
            <a href="index.html" class="hover:text-green-600 transition">Home</a>
            <a href="login.html" class="hover:text-green-600 transition">Login</a>
            <a href="#signup-section" class="bg-green-600 text-white px-3 md:px-4 py-2 rounded-lg hover:bg-green-700 transition">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="signup-section" class="flex flex-col items-center justify-center min-h-[80vh] px-4 py-12">
        
        <div class="w-full max-w-sm flex flex-col items-center" data-aos="fade-up">
            
            <div class="text-center mb-10">
                <div class="p-2.5 bg-green-50 rounded-full border border-green-100 w-fit mx-auto mb-3">
                    <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Create your Account</h1>
                <p class="text-gray-600 text-sm">Start your career readiness journey</p>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-100 w-full transition-all duration-300 hover:shadow-2xl">
                
                <div id="feedback" class="hidden text-sm p-3 rounded-lg mb-4 text-center font-medium"></div>

                <form id="signupForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fa-regular fa-user mr-2 text-gray-400"></i>Full Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fa-solid fa-envelope mr-2 text-gray-400"></i>Email</label>
                        <input type="email" id="email" required placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fa-solid fa-lock mr-2 text-gray-400"></i>Password</label>
                        <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition">
                    </div>
                    <button type="submit" id="signupBtn" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 transition active:scale-[0.98]">Sign Up →</button>
                </form>

                <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div><div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-gray-500">OR</span></div></div>

                <button id="googleBtn" class="w-full border border-gray-200 py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 6.58c1.59 0 3.02.55 4.14 1.62l3.12-3.12C17.46 3.07 14.97 2 12 2 7.7 2 3.99 4.47 2.18 7.07l3.66 2.83c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>
                <p class="text-center text-sm text-gray-600 mt-6">Already a member? <a href="login.html" class="text-green-600 font-semibold hover:underline">Login</a></p>
            </div>

        </div>
    </main>

    <!-- FOOTER LIBRARIES AND FIREBASE LOGIC LAYER -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ 
            duration: 350, 
            once: true 
        });
    </script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Verified working database credentials matching the active context branch
        const firebaseConfig = {
            apiKey: "AIzaSyAsDrW_Yy5KhODrWv4VhtZhMwqqsueWHhQ",
            authDomain: "myfirst-project-be8a6.firebaseapp.com",
            projectId: "myfirst-project-be8a6",
            storageBucket: "myfirst-project-be8a6.firebasestorage.app",
            messagingSenderId: "200529674375",
            appId: "1:200529674375:web:63ab761d5f7acbfc7f7822",
            measurementId: "G-LJ02K1J4J1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const feedback = document.getElementById('feedback');
        const signupBtn = document.getElementById('signupBtn');

        function showFeedback(message, isError = true) {
            feedback.textContent = message;
            feedback.className = `text-sm p-3 rounded-lg mb-4 text-center font-medium ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            feedback.classList.remove('hidden');
        }

        // Email/Password Signup Engine Routing straight to userprofile2.html
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            signupBtn.disabled = true;
            signupBtn.textContent = "Creating account...";

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    provider: "password",
                    profileCompleted: false, // Flag initialized to block direct dashboard entry
                    createdAt: new Date().toISOString()
                });

                showFeedback("Account created successfully!", false);
                setTimeout(() => window.location.href = "userprofile2.html", 1500);
            } catch (error) {
                showFeedback("Error: " + error.message);
                signupBtn.disabled = false;
                signupBtn.textContent = "Sign Up →";
            }
        });

        // Google Federated Signup Engine Routing straight to userprofile2.html
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const userRef = doc(db, "users", user.uid);
                const existing = await getDoc(userRef);

                if (!existing.exists()) {
                    await setDoc(userRef, {
                        fullName: user.displayName || "",
                        email: user.email,
                        photoURL: user.photoURL || "",
                        provider: "google",
                        profileCompleted: false, // Flag initialized to block direct dashboard entry
                        createdAt: new Date().toISOString()
                    });
                    showFeedback("Signed up successfully!", false);
                    setTimeout(() => window.location.href = "userprofile2.html", 1500);
                } else {
                    // If they already have an account, determine where they belong based on status field
                    if (existing.data().profileCompleted) {
                        window.location.href = "userdashboard.html";
                    } else {
                        window.location.href = "userprofile2.html";
                    }
                }
            } catch (error) {
                showFeedback("Google sign-in failed.");
            }
        });
    </script>
</body>
</html>
