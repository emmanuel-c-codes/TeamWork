<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Maps | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 145px); width: 100%; z-index: 1; }
        .leaflet-popup-content-wrapper { border-radius: 12px; font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-white px-5 pt-5 pb-3 sticky top-0 z-20 shadow-sm border-b border-slate-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-800 uppercase tracking-wide">Live Jobs Map</h1>
                <p class="text-xs text-slate-400 font-medium">Real-time incident view across Port Harcourt</p>
            </div>
            <span class="bg-emerald-50 text-emerald-600 border border-emerald-100 font-bold text-[10px] px-2.5 py-1 rounded-full flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Live Tracking
            </span>
        </div>
    </header>

    <!-- Map Canvas Container -->
    <div id="map" class="bg-slate-100"></div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around py-3.5 px-2 z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Home</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            <span class="text-[10px] font-semibold mt-1">History</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zm0 14l4-4V1.586l-4 4v14zm-5-10l-4-4v12.828l4 4V5.586zm10-4l4 4v12.828l-4-4V1.586z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-bold mt-1">Map</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Standard Default Map Focus: Port Harcourt Coordinate Box
        const map = L.map('map').setView([4.8156, 7.0498], 12);

        // OpenStreetMap Layer Integration 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        async function plotActiveJobs() {
            try {
                const querySnapshot = await getDocs(collection(db, "reports"));
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Fallback evaluation if explicit geometric floating targets missing
                    const lat = data.latitude || (4.81 + (Math.random() - 0.5) * 0.05);
                    const lng = data.longitude || (7.04 + (Math.random() - 0.5) * 0.05);

                    const popupHTML = `
                        <div class="p-1">
                            <h3 class="text-xs font-black text-slate-800 uppercase">${data.title || data.category || 'Incident Alert'}</h3>
                            <p class="text-[11px] text-slate-500 mt-1">${data.location || 'PH Area'}</p>
                            <div class="mt-2 text-[10px] font-bold text-emerald-600">Status: ${data.status || 'Open'}</div>
                        </div>
                    `;

                    L.marker([lat, lng]).addTo(map).bindPopup(popupHTML);
                });
            } catch (error) {
                console.error("Map fetch tracking error: ", error);
            }
        }

        plotActiveJobs();
    </script>
</body>
</html>
