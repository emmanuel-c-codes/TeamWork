<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
    </style>
</head>
<body class="bg-slate-50 relative min-h-screen">

    <!-- Top Navigation Bar (Simplified for logged-in user completing setup) -->
    <nav class="absolute top-0 left-0 w-full p-4 px-6 md:px-10 flex items-center justify-between animate-fade-in z-10">
        <div class="flex items-center gap-2 text-slate-700">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <span class="text-lg font-bold tracking-wide">EcoMonitor</span>
        </div>
        <button id="logoutBtn" class="text-sm font-medium text-slate-500 hover:text-red-500 transition-colors">Logout</button>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="min-h-screen flex items-center justify-center p-4 pt-20 pb-8">
        
        <!-- Main Card -->
        <div class="w-full max-w-lg bg-white/60 backdrop-blur-sm rounded-2xl shadow-xl border border-slate-100 p-6 sm:p-8 animate-fade-in delay-100 opacity-0">
            
            <h2 class="text-2xl font-bold text-slate-800 mb-1 text-center">Complete Your Profile</h2>
            <p class="text-center text-slate-500 text-sm mb-6">Let your neighborhood know who you are</p>

            <form id="profileForm" class="space-y-5 animate-fade-in delay-200 opacity-0">
                
                <!-- Profile Photo Upload -->
                <div class="flex flex-col items-center gap-3">
                    <div class="w-24 h-24 rounded-full bg-slate-200 flex items-center justify-center border-4 border-white shadow-sm overflow-hidden" id="imagePreviewContainer">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <img id="imagePreview" class="hidden w-full h-full object-cover" />
                    </div>
                    <label class="cursor-pointer bg-slate-100 text-slate-600 text-xs font-bold py-2 px-4 rounded-full hover:bg-slate-200 transition">
                        Upload Photo
                        <input type="file" id="profilePic" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- State Field -->
                    <div class="group">
                        <label class="block text-sm font-medium text-slate-600 mb-1.5 group-focus-within:text-green-600 transition-colors">State</label>
                        <input type="text" id="state" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50/50 focus:ring-2 focus:ring-green-600 focus:bg-white outline-none transition-all duration-300" placeholder="e.g., Rivers State">
                    </div>

                    <!-- LGA Field -->
                    <div class="group">
                        <label class="block text-sm font-medium text-slate-600 mb-1.5 group-focus-within:text-green-600 transition-colors">LGA</label>
                        <input type="text" id="lga" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50/50 focus:ring-2 focus:ring-green-600 focus:bg-white outline-none transition-all duration-300" placeholder="e.g., Port Harcourt">
                    </div>
                </div>

                <!-- Bio Field -->
                <div class="group">
                    <label class="block text-sm font-medium text-slate-600 mb-1.5 group-focus-within:text-green-600 transition-colors">Bio</label>
                    <textarea id="bio" rows="3" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50/50 focus:ring-2 focus:ring-green-600 focus:bg-white outline-none transition-all duration-300 resize-none" placeholder="e.g., 300L Computer Science student passionate about the environment..."></textarea>
                </div>

                <button type="submit" id="saveBtn" class="w-full flex items-center justify-center gap-2 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 mt-4">
                    <span id="saveBtnText">Save Profile & Continue</span>
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- FIREBASE PROFILE SETUP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        // Auth imports
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        // Firestore imports
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        // Storage imports (Required for Image Uploads)
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsDrW_Yy5KhODrWv4VhtZhMwqqsueWHhQ",
            authDomain: "myfirst-project-be8a6.firebaseapp.com",
            projectId: "myfirst-project-be8a6",
            storageBucket: "myfirst-project-be8a6.firebasestorage.app",
            messagingSenderId: "200529674375",
            appId: "1:200529674375:web:63ab761d5f7acbfc7f7822",
            measurementId: "G-LJ02K1J4J1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;

        // 1. Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                // If they are not logged in, boot them back to the login page
                window.location.href = "login.html";
            }
        });

        // 2. Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // 3. Image Preview Logic
        const profilePicInput = document.getElementById('profilePic');
        const imagePreview = document.getElementById('imagePreview');

        profilePicInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // 4. Save Profile Form Submission
        const profileForm = document.getElementById('profileForm');
        const saveBtn = document.getElementById('saveBtn');
        const saveBtnText = document.getElementById('saveBtnText');

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            saveBtn.disabled = true;
            saveBtnText.textContent = "Uploading & Saving...";

            const state = document.getElementById('state').value;
            const lga = document.getElementById('lga').value;
            const bio = document.getElementById('bio').value;
            const file = profilePicInput.files[0];

            try {
                let photoURL = "";

                // Upload image to Firebase Storage if a file was selected
                if (file) {
                    // Create a reference path: profiles/USER_ID/filename
                    const storageRef = ref(storage, `profiles/${currentUser.uid}/${file.name}`);
                    await uploadBytes(storageRef, file);
                    photoURL = await getDownloadURL(storageRef);
                }

                // Prepare data to save to Firestore
                const updateData = {
                    state: state,
                    lga: lga,
                    bio: bio,
                    profileCompleted: true,
                    updatedAt: new Date().toISOString()
                };

                // Add photoURL only if an image was uploaded
                if (photoURL !== "") {
                    updateData.photoURL = photoURL;
                }

                // Use merge: true so we don't accidentally overwrite their name/email
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, updateData, { merge: true });

                // Redirect to the main report dashboard after success
                window.location.href = "report.html"; 

            } catch (error) {
                alert("Error saving profile: " + error.message);
                saveBtn.disabled = false;
                saveBtnText.textContent = "Save Profile & Continue";
            }
        });
    </script>
</body>
</html>
