<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth Custom animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
</head>
<body class="bg-slate-50 relative min-h-screen">

    <!-- Top Navigation Bar -->
    <nav class="absolute top-0 left-0 w-full p-4 px-6 md:px-10 flex items-center justify-between animate-fade-in z-10">
        <!-- Left Side: Logo -->
        <a href="index.html" class="flex items-center gap-2 text-slate-700 hover:text-green-600 transition-colors duration-300">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <span class="text-lg font-bold tracking-wide">EcoMonitor</span>
        </a>

        <!-- Right Side: Menu Links -->
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-green-600 transition-colors">Home</a>
            <a href="login.html" class="text-sm font-bold text-slate-900 transition-colors">Login</a>
            <a href="signup.html" class="text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 px-5 py-2 rounded-lg transition-colors shadow-sm">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content Spacing Wrapper -->
    <div class="min-h-screen flex items-center justify-center p-4 pt-20 pb-8">
        
        <!-- Main Form Card -->
        <div class="w-full max-w-md bg-white/60 backdrop-blur-sm rounded-2xl shadow-xl border border-slate-100 p-6 sm:p-8 animate-fade-in delay-100 opacity-0">
            
            <!-- Centered Shield Header Logo -->
            <div class="flex justify-center mb-3">
                <div class="p-2.5 bg-green-50 rounded-full border border-green-100">
                    <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-slate-800 mb-1 text-center">Welcome Back</h2>
            <p class="text-center text-slate-500 text-sm mb-6">Enter your details to access your account</p>

            <form id="loginForm" class="space-y-4 animate-fade-in delay-200 opacity-0">
                <!-- Email input group -->
                <div class="group">
                    <label class="flex items-center gap-2 text-sm font-medium text-slate-600 mb-1.5 group-focus-within:text-green-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        Email Address
                    </label>
                    <input type="email" id="email" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50/50 focus:ring-2 focus:ring-green-600 focus:bg-white outline-none transition-all duration-300" placeholder="you@example.com">
                </div>

                <!-- Password input group -->
                <div class="group">
                    <label class="flex items-center gap-2 text-sm font-medium text-slate-600 mb-1.5 group-focus-within:text-green-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-.895 2-2 2s-2-.895-2-2 .895-2 2-2 2 .895 2 2zm0 0v3m6-3a6 6 0 10-12 0v3a2 2 0 00-2 2v4a2 2 0 002 2h12a2 2 0 002-2v-4a2 2 0 00-2-2v-3z"/></svg>
                        Password
                    </label>
                    <input type="password" id="password" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50/50 focus:ring-2 focus:ring-green-600 focus:bg-white outline-none transition-all duration-300" placeholder="••••••••">
                </div>

                <!-- Action Button -->
                <button type="submit" id="loginBtn" class="w-full flex items-center justify-center gap-2 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 mt-2 active:scale-95">
                    <span id="loginBtnText">Sign In</span>
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                </button>
            </form>

            <!-- Separator -->
            <div class="flex items-center gap-3 my-5 animate-fade-in delay-300 opacity-0">
                <div class="flex-1 h-px bg-slate-200"></div>
                <span class="text-xs text-slate-400 font-medium">OR</span>
                <div class="flex-1 h-px bg-slate-200"></div>
            </div>

            <!-- Third Party Providers & Sign-up Route Links -->
            <div class="animate-fade-in delay-300 opacity-0">
                <button id="googleBtn" class="w-full flex items-center justify-center gap-3 border border-slate-200 bg-white py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-50 hover:shadow-sm transition-all duration-300 active:scale-95">
                    <svg class="w-5 h-5" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.7-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
                        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                        <path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.6C29.6 35 26.9 36 24 36c-5.2 0-9.7-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/>
                        <path fill="#1976D2" d="M43.6 20.5H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.6C41.5 36.5 44 30.8 44 24c0-1.3-.1-2.7-.4-3.5z"/>
                    </svg>
                    Continue with Google
                </button>

                <p class="text-center text-slate-500 mt-5 text-sm">Don't have an account? <a href="signup.html" class="text-green-600 font-bold hover:text-green-700 hover:underline transition-colors">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- SECURITY CERTIFICATE PIPELINE CORE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Verified active layout parameters matrix configurations
        const firebaseConfig = {
            apiKey: "AIzaSyAsDrW_Yy5KhODrWv4VhtZhMwqqsueWHhQ",
            authDomain: "myfirst-project-be8a6.firebaseapp.com",
            projectId: "myfirst-project-be8a6",
            storageBucket: "myfirst-project-be8a6.firebasestorage.app",
            messagingSenderId: "200529674375",
            appId: "1:200529674375:web:63ab761d5f7acbfc7f7822",
            measurementId: "G-LJ02K1J4J1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // --- Standard Auth Form Processing Engine ---
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtnText.textContent = "Signing in...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                // Double check if profile dataset layout fields exist to navigate correctly
                const userDocRef = doc(db, "users", auth.currentUser.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists() && docSnap.data().profileCompleted) {
                    window.location.href = "userdashboard.html";
                } else {
                    window.location.href = "userprofile2.html";
                }
            } catch (error) {
                alert("Login Error: " + error.message);
                loginBtn.disabled = false;
                loginBtnText.textContent = "Sign In";
            }
        });

        // --- Federated Third Party Provider Google Auth Process Pipeline ---
        const googleBtn = document.getElementById('googleBtn');

        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const userRef = doc(db, "users", user.uid);
                const existing = await getDoc(userRef);

                if (!existing.exists()) {
                    await setDoc(userRef, {
                        fullName: user.displayName || "",
                        email: user.email,
                        photoURL: user.photoURL || "",
                        provider: "google",
                        profileCompleted: false,
                        createdAt: new Date().toISOString()
                    });
                    window.location.href = "userprofile2.html";
                } else {
                    if(existing.data().profileCompleted) {
                        window.location.href = "userdashboard.html";
                    } else {
                        window.location.href = "userprofile2.html";
                    }
                }
            } catch (error) {
                alert("Provider Error: " + error.message);
            } finally {
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
