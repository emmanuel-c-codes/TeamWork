<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle & Earn | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-slide-up { animation: slideInUp 0.4s ease-out forwards; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white px-5 pt-6 pb-4 sticky top-0 z-20 shadow-sm border-b border-slate-100 flex items-center gap-3">
        <a href="dashboard.html" class="p-2 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors">
            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <div>
            <h1 class="text-xl font-black text-slate-800 uppercase tracking-wide">Recycle & Earn</h1>
            <p class="text-xs text-slate-400 font-medium">Log your batch for pickup</p>
        </div>
    </header>

    <main class="p-5">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 animate-slide-up">
            <form id="recycleForm" class="space-y-5">
                
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">Material Category</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="material" value="PET Plastics" class="peer sr-only" checked>
                            <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all text-center">
                                <span class="text-xs font-bold block">PET Plastics</span>
                                <span class="text-[9px] text-slate-400 block font-medium mt-0.5">~₦150 / KG</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="material" value="Aluminum Cans" class="peer sr-only">
                            <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all text-center">
                                <span class="text-xs font-bold block">Aluminum Cans</span>
                                <span class="text-[9px] text-slate-400 block font-medium mt-0.5">~₦400 / KG</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">Estimated Weight (KG)</label>
                    <input type="number" id="weight" min="5" placeholder="Minimum 5kg for pickup" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-800 focus:outline-none focus:border-emerald-500 transition-colors" required>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">Pickup Address</label>
                    <textarea id="location" rows="2" placeholder="e.g., 12 Woji Road, GRA Phase 2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-800 focus:outline-none focus:border-emerald-500 transition-colors resize-none" required></textarea>
                </div>

                <!-- Dynamic Estimation Preview Card Metrics Component -->
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-150 text-xs font-medium text-slate-600 space-y-1.5">
                    <div class="flex justify-between">
                        <span>Est. Cash Yield:</span>
                        <span class="font-bold text-slate-800">₦<span id="previewCash">0.00</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>Est. Eco-Points:</span>
                        <span class="font-bold text-emerald-600">+<span id="previewPoints">0</span> pts</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black text-xs py-4 rounded-xl uppercase tracking-wider transition-all shadow-lg shadow-emerald-500/20 active:scale-95 flex justify-center items-center gap-2">
                    Request Collector Pickup
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Configuration map for localized financial multipliers
        const RATES = {
            "PET Plastics": 150,
            "Aluminum Cans": 400
        };
        const POINTS_PER_KG = 5;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = "login.html";
            }
        });

        const weightInput = document.getElementById('weight');
        const materialRadios = document.querySelectorAll('input[name="material"]');

        // Dynamic local live calculation tracking pipeline
        function updateEstimation() {
            const weight = parseFloat(weightInput.value) || 0;
            const selectedMaterial = document.querySelector('input[name="material"]:checked').value;
            
            const cashRate = RATES[selectedMaterial] || 0;
            const calculatedCash = weight * cashRate;
            const calculatedPoints = weight * POINTS_PER_KG;

            document.getElementById('previewCash').innerText = calculatedCash.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('previewPoints').innerText = calculatedPoints;
        }

        weightInput.addEventListener('input', updateEstimation);
        materialRadios.forEach(radio => radio.addEventListener('change', updateEstimation));

        document.getElementById('recycleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-slate-900/30 border-t-slate-900 rounded-full animate-spin"></div>`;
            btn.disabled = true;

            const material = document.querySelector('input[name="material"]:checked').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const location = document.getElementById('location').value;

            const finalCashYield = weight * RATES[material];
            const finalPointsYield = weight * POINTS_PER_KG;

            try {
                // Logs structural fields directly into the unified report collection layout
                await addDoc(collection(db, "reports"), {
                    userId: currentUser.uid,
                    title: `${weight}kg ${material}`,
                    category: "Recycling",
                    materialType: material,
                    weightKg: weight,
                    estimatedPayout: finalCashYield,
                    estimatedPoints: finalPointsYield,
                    location: location,
                    status: "pending",
                    createdAt: serverTimestamp(),
                    latitude: 4.81 + (Math.random() - 0.5) * 0.05,
                    longitude: 7.04 + (Math.random() - 0.5) * 0.05
                });

                alert(`Pickup requested successfully!\nEstimated Yield: ₦${finalCashYield.toLocaleString()}`);
                window.location.href = "dashboard.html";
                
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to create request. Please try again.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
