<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm">
        <h2 class="text-xl font-bold mb-6">Incident Status</h2>
        
        <div class="relative border-l-2 border-green-200 ml-3 space-y-8">
            <div class="relative pl-6">
                <div class="absolute -left-2 w-4 h-4 bg-green-600 rounded-full"></div>
                <h4 class="font-bold">Report Submitted</h4>
                <p class="text-xs text-gray-500">June 29, 2026</p>
            </div>
            <div class="relative pl-6">
                <div class="absolute -left-2 w-4 h-4 bg-green-200 rounded-full"></div>
                <h4 class="font-bold text-gray-400">Under Review</h4>
            </div>
            <div class="relative pl-6">
                <div class="absolute -left-2 w-4 h-4 bg-gray-200 rounded-full"></div>
                <h4 class="font-bold text-gray-400">Resolved</h4>
            </div>
        </div>
    </div>
</body>
</html>
