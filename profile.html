<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoMonitor | Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { display: ['Fraunces', 'serif'], body: ['Inter', 'sans-serif'] },
        colors: {
          forest: { 900:'#10261E', 700:'#1B4332', 500:'#2D6A4F', 300:'#74A892' },
          sand:   { 50:'#FBF9F2', 100:'#F1EFE3', 200:'#E6E2D0' },
          clay:   { 500:'#C97B4A', 600:'#B3653A' },
          signal: { 500:'#3A7CA5' }
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, .font-display { font-family: 'Fraunces', serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #E6E2D0; border-radius: 3px; }
</style>
</head>
<body class="bg-sand-50 text-forest-900">

  <!-- Top nav -->
  <nav class="border-b border-sand-200 bg-sand-50/90 backdrop-blur sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-display text-lg font-700 text-forest-700">EcoMonitor</a>
      <a href="explore.html" class="text-sm font-medium text-forest-500 hover:text-forest-700 transition flex items-center gap-1.5">
        Explore community
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
      </a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Loading state -->
    <div id="loadingState" class="py-24 text-center text-forest-300 text-sm">Loading profile…</div>

    <!-- Profile content -->
    <div id="profileContent" class="hidden">

      <!-- Header card -->
      <section class="bg-white border border-sand-200 rounded-3xl p-8 shadow-sm">
        <div class="flex flex-col sm:flex-row sm:items-center gap-6">
          <img id="avatar" class="w-20 h-20 rounded-full object-cover ring-4 ring-sand-100 shrink-0" src="" alt="">
          <div class="flex-1 min-w-0">
            <p id="welcomeLabel" class="text-sm font-medium text-forest-300 mb-1">Welcome back</p>
            <h1 id="userName" class="font-display text-3xl font-700 text-forest-900 truncate"></h1>
            <p id="userMeta" class="text-sm text-forest-500 mt-1"></p>
          </div>
          <span id="ownerBadge" class="hidden shrink-0 bg-forest-700 text-white text-xs font-semibold px-3 py-1.5 rounded-full">This is you</span>
        </div>

        <!-- Stat row -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8 pt-8 border-t border-sand-100">
          <div>
            <p id="statTotal" class="font-display text-2xl font-700 text-forest-700">0</p>
            <p class="text-xs text-forest-300 font-medium mt-0.5">Reports filed</p>
          </div>
          <div>
            <p id="statResolved" class="font-display text-2xl font-700 text-signal-500">0</p>
            <p class="text-xs text-forest-300 font-medium mt-0.5">Resolved</p>
          </div>
          <div>
            <p id="statPending" class="font-display text-2xl font-700 text-clay-500">0</p>
            <p class="text-xs text-forest-300 font-medium mt-0.5">Pending</p>
          </div>
          <div>
            <p id="statAreas" class="font-display text-2xl font-700 text-forest-700">0</p>
            <p class="text-xs text-forest-300 font-medium mt-0.5">Areas covered</p>
          </div>
        </div>
      </section>

      <!-- Signature: habitat strip — a fingerprint of what this user reports on -->
      <section class="mt-6 bg-white border border-sand-200 rounded-3xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-forest-700">Reporting fingerprint</h2>
          <p class="text-xs text-forest-300">By category</p>
        </div>
        <div id="habitatStrip" class="flex h-3 w-full rounded-full overflow-hidden bg-sand-100"></div>
        <div id="habitatLegend" class="flex flex-wrap gap-x-5 gap-y-2 mt-3 text-xs text-forest-500"></div>
      </section>

      <!-- Report history -->
      <section class="mt-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display text-xl font-700">Report history</h2>
          <p id="historyCount" class="text-sm text-forest-300"></p>
        </div>
        <div id="reportList" class="space-y-3"></div>
        <div id="emptyState" class="hidden bg-white border border-dashed border-sand-200 rounded-2xl p-12 text-center">
          <p class="text-forest-500 font-medium">No reports filed yet</p>
          <p class="text-sm text-forest-300 mt-1">Reports submitted will show up here, building a visible record of impact.</p>
        </div>
      </section>

    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
      projectId: "client-cc4df",
      storageBucket: "client-cc4df.firebasestorage.app",
      messagingSenderId: "600063857476",
      appId: "1:600063857476:web:9abfe8219251f56e67fd11"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Category colors, used for the habitat strip + status pills
    const CATEGORY_COLORS = {
      "Waste":          "#2D6A4F",
      "Flooding":       "#3A7CA5",
      "Sewage":         "#B3653A",
      "Air Pollution":  "#74A892",
      "General":        "#9CA3AF"
    };

    const params = new URLSearchParams(window.location.search);
    const viewedUid = params.get('uid'); // if absent, we show the logged-in user's own profile

    onAuthStateChanged(auth, async (user) => {
      if (!user && !viewedUid) {
        window.location.href = "login.html";
        return;
      }

      const targetUid = viewedUid || user.uid;
      const isOwnProfile = user && targetUid === user.uid;

      await loadProfile(targetUid, isOwnProfile);
    });

    async function loadProfile(uid, isOwnProfile) {
      // 1. Load user record
      const userSnap = await getDoc(doc(db, "users", uid));
      if (!userSnap.exists()) {
        document.getElementById('loadingState').textContent = "This profile could not be found.";
        return;
      }
      const userData = userSnap.data();

      document.getElementById('avatar').src = userData.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(userData.fullName || 'EM')}&backgroundColor=2D6A4F&textColor=ffffff`;
      document.getElementById('userName').textContent = userData.fullName || "EcoMonitor user";
      document.getElementById('welcomeLabel').textContent = isOwnProfile ? "Welcome back" : "Viewing profile";
      document.getElementById('userMeta').textContent = userData.email || "";
      if (isOwnProfile) document.getElementById('ownerBadge').classList.remove('hidden');

      // 2. Load this user's reports
      const reportsQuery = query(
        collection(db, "reports"),
        where("uid", "==", uid),
        orderBy("createdAt", "desc")
      );
      const reportsSnap = await getDocs(reportsQuery);
      const reports = reportsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      renderStats(reports);
      renderHabitatStrip(reports);
      renderReportList(reports);

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('profileContent').classList.remove('hidden');
    }

    function renderStats(reports) {
      const total = reports.length;
      const resolved = reports.filter(r => r.status === 'Resolved').length;
      const pending = total - resolved;
      const areas = new Set(reports.map(r => r.location).filter(Boolean)).size;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statResolved').textContent = resolved;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statAreas').textContent = areas;
    }

    function renderHabitatStrip(reports) {
      const strip = document.getElementById('habitatStrip');
      const legend = document.getElementById('habitatLegend');

      if (reports.length === 0) {
        strip.innerHTML = `<div class="w-full bg-sand-100"></div>`;
        legend.innerHTML = `<span class="text-forest-300">No reports yet to show a pattern</span>`;
        return;
      }

      const counts = {};
      reports.forEach(r => {
        const cat = r.category || "General";
        counts[cat] = (counts[cat] || 0) + 1;
      });

      strip.innerHTML = Object.entries(counts).map(([cat, count]) => {
        const pct = (count / reports.length * 100).toFixed(1);
        const color = CATEGORY_COLORS[cat] || CATEGORY_COLORS.General;
        return `<div style="width:${pct}%; background:${color}" title="${cat}: ${count}"></div>`;
      }).join('');

      legend.innerHTML = Object.entries(counts).map(([cat, count]) => {
        const color = CATEGORY_COLORS[cat] || CATEGORY_COLORS.General;
        return `<span class="flex items-center gap-1.5">
                  <span class="w-2 h-2 rounded-full inline-block" style="background:${color}"></span>
                  ${cat} <span class="text-forest-300">(${count})</span>
                </span>`;
      }).join('');
    }

    function renderReportList(reports) {
      const list = document.getElementById('reportList');
      document.getElementById('historyCount').textContent = `${reports.length} total`;

      if (reports.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      list.innerHTML = reports.map(r => {
        const isResolved = r.status === 'Resolved';
        const color = CATEGORY_COLORS[r.category] || CATEGORY_COLORS.General;
        const date = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

        return `
        <div class="bg-white border border-sand-200 rounded-2xl p-4 flex gap-4 items-center hover:border-forest-300 transition">
          ${r.image
            ? `<img src="${r.image}" class="w-16 h-16 rounded-xl object-cover shrink-0">`
            : `<div class="w-16 h-16 rounded-xl bg-sand-100 flex items-center justify-center text-[10px] text-forest-300 shrink-0">NO PHOTO</div>`
          }
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-1.5 rounded-full" style="background:${color}"></span>
              <p class="text-xs font-semibold text-forest-500">${r.category || 'General'}</p>
              <span class="text-xs text-forest-300">·</span>
              <p class="text-xs text-forest-300">${date}</p>
            </div>
            <p class="font-medium text-forest-900 truncate mt-0.5">${r.location || 'Unknown location'}</p>
            <p class="text-sm text-forest-500 truncate">${r.issue || ''}</p>
          </div>
          <span class="shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full ${isResolved ? 'bg-forest-700/10 text-forest-700' : 'bg-clay-500/10 text-clay-600'}">
            ${r.status || 'Pending'}
          </span>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
