<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-white px-5 pt-6 pb-4 border-b border-slate-100">
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-wide">Account Profile</h1>
    </header>

    <main class="p-5">
        <!-- User Badge Display Card -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100/80 flex items-center gap-4 mb-6">
            <div class="w-16 h-16 rounded-full overflow-hidden bg-slate-100 border border-slate-200">
                <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="profileName" class="text-lg font-black text-slate-800 uppercase tracking-wide">Loading...</h2>
                <p id="profileEmail" class="text-xs text-slate-400 font-medium mb-1">...</p>
                <span class="bg-slate-900 text-white font-bold text-[9px] px-2 py-0.5 rounded-full uppercase border border-slate-700">Eco Guardian</span>
            </div>
        </div>

        <!-- Detail Formulation Update Inputs -->
        <h3 class="text-sm font-black text-slate-800 mb-3 uppercase tracking-wider">Modify Identity Details</h3>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-4">
            <form id="updateProfileForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-1">Full Identity Signature Name</label>
                    <input type="text" id="inputFullName" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-800 focus:outline-none focus:border-emerald-500 transition-colors" required>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black text-xs py-3.5 rounded-xl uppercase tracking-wider transition-all shadow-md shadow-emerald-500/10">
                    Apply Profile Updates
                </button>
            </form>
        </div>

        <!-- Utilities Action Array List -->
        <div class="space-y-2">
            <button id="profileLogoutBtn" class="w-full bg-white border border-red-100 hover:bg-red-50 text-red-500 font-bold text-xs py-3 rounded-xl transition-all">
                Terminate Active Session (Log Out)
            </button>
        </div>
    </main>

    <!-- Navigation Framework -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around py-3.5 px-2 z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Home</span>
        </a>
        <a href="history.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            <span class="text-[10px] font-semibold mt-1">History</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center text-slate-400 hover:text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-semibold mt-1">Map</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-emerald-600 transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-bold mt-1">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUserRef = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                activeUserRef = user;
                document.getElementById("profileEmail").innerText = user.email;
                
                let currentName = user.displayName || "";
                
                // Fetch supplementary firestore configurations
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().fullName) {
                    currentName = userDoc.data().fullName;
                }

                document.getElementById("profileName").innerText = currentName || "Eco User";
                document.getElementById("inputFullName").value = currentName;
                document.getElementById("profileAvatar").src = user.photoURL || `https://ui-avatars.com/api/?name=${currentName || 'User'}&background=10b981&color=fff`;
            } else {
                window.location.href = "login.html";
            }
        });

        // Handle Mutation Data Updates
        document.getElementById("updateProfileForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!activeUserRef) return;

            const updatedName = document.getElementById("inputFullName").value.trim();
            try {
                await setDoc(doc(db, "users", activeUserRef.uid), {
                    fullName: updatedName
                }, { merge: true });

                document.getElementById("profileName").innerText = updatedName;
                alert("Profile changes successfully propagated to database.");
            } catch (err) {
                console.error(err);
                alert("Profile adjustment write failed.");
            }
        });

        document.getElementById("profileLogoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>
</body>
</html>
