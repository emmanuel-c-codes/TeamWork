<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>ES6 Quiz Pro</title>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white w-full max-w-2xl p-6 rounded-xl shadow-lg">

  <!-- Header -->
  <div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">⚡ ES6 Quiz Pro</h1>
    <div class="text-red-500 font-bold">⏱️ <span id="timer">90</span>s</div>
  </div>

  <!-- Progress Bar -->
  <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
    <div id="progress" class="bg-blue-500 h-2 rounded-full w-0"></div>
  </div>

  <!-- Score + Index -->
  <div class="flex justify-between text-sm mb-4">
    <p>Score: <span id="score">0</span></p>
    <p>Question: <span id="qIndex">1</span>/10</p>
  </div>

  <!-- Quiz Box -->
  <div id="quizBox">

    <h2 id="question" class="text-lg font-semibold mb-4"></h2>

    <div id="options" class="space-y-2"></div>

    <div class="flex justify-between mt-4">
      <button onclick="prevQuestion()"
        class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
        ⬅ Back
      </button>

      <button onclick="nextQuestion()"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Next ➡
      </button>
    </div>

  </div>

  <!-- Result -->
  <div id="result" class="hidden text-center">
    <h2 class="text-2xl font-bold text-green-600">Quiz Completed 🎉</h2>
    <p class="mt-2">Final Score:</p>
    <p id="finalScore" class="text-3xl font-bold text-blue-600"></p>
  </div>

</div>

<script>

/* 🔊 SOUND EFFECTS */
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

/* 📘 ES6 QUESTIONS */
let questions = [
  {q:"ES6 keyword for constant?", options:["var","let","const","static"], answer:"const"},
  {q:"Block scoped variable?", options:["var","let","function","global"], answer:"let"},
  {q:"Arrow function syntax?", options:["()=>{}","function(){}","def()","lambda"], answer:"()=>{}"},
  {q:"Template literals use?", options:["''","``","\"\"","{}"], answer:"``"},
  {q:"Spread operator?", options:["...","***","&&&","///"], answer:"..."},
  {q:"Destructuring means?", options:["Extract values","Delete variables","Loop array","Sort data"], answer:"Extract values"},
  {q:"ES6 modules?", options:["import/export","require","include","load"], answer:"import/export"},
  {q:"Promise handles?", options:["Async operations","Loops","CSS","DOM only"], answer:"Async operations"},
  {q:"Success handler in Promise?", options:[".then()",".catch()",".run()",".runNow()"], answer:".then()"},
  {q:"Failure handler in Promise?", options:[".catch()",".then()",".error()",".fail()"], answer:".catch()"}
];

/* 🔀 RANDOMIZE */
questions = questions.sort(() => Math.random() - 0.5);

let index = 0;
let score = 0;
let time = 90;
let selectedAnswers = Array(questions.length).fill(null);

/* UI */
const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const qIndexEl = document.getElementById("qIndex");
const progressEl = document.getElementById("progress");

/* 📌 LOAD QUESTION */
function loadQuestion() {
  const q = questions[index];

  qIndexEl.textContent = index + 1;
  questionEl.textContent = q.q;

  optionsEl.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "w-full p-2 border rounded hover:bg-gray-200";

    if (selectedAnswers[index] === opt) {
      btn.classList.add("bg-blue-100");
    }

    btn.onclick = () => {
      selectedAnswers[index] = opt;

      if (opt === q.answer) {
        correctSound.play();
      } else {
        wrongSound.play();
      }

      updateScore();
      loadQuestion();
    };

    optionsEl.appendChild(btn);
  });

  updateProgress();
}

/* 🎯 SCORE */
function updateScore() {
  score = selectedAnswers.filter((ans, i) => ans === questions[i].answer).length;
  scoreEl.textContent = score;
}

/* 📊 PROGRESS */
function updateProgress() {
  let percent = ((index + 1) / questions.length) * 100;
  progressEl.style.width = percent + "%";
}

/* ➡ NEXT */
function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    endQuiz();
  }
}

/* ⬅ BACK */
function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

/* 🏁 END QUIZ */
function endQuiz() {
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("finalScore").textContent =
    `${score} / ${questions.length}`;

  saveScore();
}

/* ⏱ TIMER */
setInterval(() => {
  time--;
  timerEl.textContent = time;

  if (time <= 0) endQuiz();
}, 1000);

/* 🚀 START */
loadQuestion();

/* 💾 BACKEND SAVE */
function saveScore() {

  console.log("Saving score...");

  /*
  🔥 FIREBASE:
  import { addDoc, collection } from "firebase/firestore";

  await addDoc(collection(db, "es6_scores"), {
    score,
    total: questions.length,
    date: new Date()
  });
  */

  /*
  🟢 NODE.JS:
  fetch("http://localhost:3000/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({score, total: questions.length})
  });
  */
}

</script>

</body>
</html>
