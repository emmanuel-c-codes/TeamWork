<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMonitor | Submit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideInUp 0.4s ease-out forwards; }
        
        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <!-- Success Overlay Modal -->
    <div id="successOverlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-green-100 animate-bounce">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-xl font-black mb-2 text-slate-800 tracking-tight">Report Secured!</h2>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">Your environmental alert has been logged successfully.</p>
            <button id="closeModalBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition duration-200 active:scale-95">Return to Dashboard</button>
        </div>
    </div>

    <!-- Premium Compact Header -->
    <header class="bg-white/80 backdrop-blur-md px-5 py-3 flex items-center gap-3 sticky top-0 z-20 border-b border-slate-200 shadow-sm">
        <a href="userdashboard.html" class="p-1.5 -ml-1 text-slate-400 hover:text-green-600 hover:bg-green-50 rounded-full transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <div>
            <h1 class="text-base font-extrabold text-slate-800 tracking-tight">File an Issue</h1>
            <p class="text-[9px] font-bold text-green-600 uppercase tracking-wider">Official Report Log</p>
        </div>
    </header>

    <main class="flex-1 max-w-2xl mx-auto w-full p-4 animate-slide-up">
        
        <form id="reportForm" class="bg-white p-5 sm:p-7 rounded-2xl shadow-sm border border-slate-200 space-y-5">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                
                <!-- Category Select -->
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Issue Category</label>
                    <div class="relative">
                        <select id="category" class="w-full pl-9 pr-8 py-2.5 border border-slate-200 rounded-xl bg-slate-50 hover:bg-white focus:ring-2 focus:ring-green-500 outline-none text-slate-700 text-sm font-semibold appearance-none">
                            <option value="Waste">Waste Management / Dumping</option>
                            <option value="Flooding">Structural Flooding</option>
                            <option value="Sewage">Open Sewage System</option>
                            <option value="Air Pollution">Air Pollution / Gas Flaring</option>
                        </select>
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        </div>
                    </div>
                </div>

                <!-- Location Field -->
                <div class="group">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Address / Landmark</label>
                    <div class="relative flex items-center">
                        <input type="text" id="location" required placeholder="e.g., Near Choba Junction" class="w-full pl-9 pr-12 py-2.5 rounded-xl border border-slate-200 bg-slate-50 hover:bg-white focus:ring-2 focus:ring-green-500 outline-none text-sm font-medium text-slate-700">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 013 0z"></path></svg>
                        </div>
                        <button type="button" onclick="getLocation()" title="Get Exact GPS Coordinates" id="gpsBtn" class="absolute right-1 p-1.5 bg-slate-200 text-slate-600 rounded-lg hover:bg-green-100 hover:text-green-600 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"></path></svg>
                        </button>
                    </div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                </div>
            </div>

            <!-- Detailed Description -->
            <div class="group">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Operational Incident Log</label>
                <textarea id="issue" required placeholder="Briefly describe the hazard..." class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-white focus:ring-2 focus:ring-green-500 outline-none h-24 resize-none text-sm font-medium text-slate-700"></textarea>
            </div>

            <!-- Multi-Image Dropzone -->
            <div class="group w-full">
                <label class="flex justify-between items-end mb-1.5">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Visual Evidence</span>
                    <span id="photoCountBadge" class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">0 / 5 Photos</span>
                </label>
                <label for="imageFile" class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-green-50 hover:border-green-300 transition-all">
                    <div class="flex flex-col items-center justify-center pt-4 pb-4">
                        <svg class="w-8 h-8 mb-1 text-slate-400 group-hover:text-green-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-xs font-semibold text-slate-600">Tap to add photos</p>
                    </div>
                    <input type="file" id="imageFile" accept="image/*" multiple class="hidden">
                </label>
                
                <!-- Dynamic Tag Container -->
                <div id="fileTagsContainer" class="hidden mt-3 flex flex-wrap gap-2"></div>
            </div>
            
            <!-- Action Submit Button (Disabled by Default) -->
            <button type="submit" id="submitBtn" disabled class="w-full flex justify-center items-center gap-2 bg-slate-300 text-slate-500 py-3.5 rounded-xl font-bold transition duration-300 cursor-not-allowed">
                <span id="btnText">Submit Official Report</span>
                <svg id="btnIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
    </main>

    <!-- UNIFIED FIREBASE & IMGBB LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11",
            measurementId: "G-MNM99NCKH9"
        };

        import { getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const IMGBB_API_KEY = "c92716e18fa6b65e124fac58dbfc6751";
        let activeUserId = "";
        let selectedFilesArray = []; 

        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUserId = user.uid;
            } else {
                window.location.href = "login.html";
            }
        });

        // --- CORE VALIDATION LOGIC ---
        const locationInput = document.getElementById('location');
        const issueInput = document.getElementById('issue');
        const submitBtn = document.getElementById('submitBtn');

        function validateForm() {
            const isLocationFilled = locationInput.value.trim() !== '';
            const isIssueFilled = issueInput.value.trim() !== '';
            const hasImages = selectedFilesArray.length > 0;

            if (isLocationFilled && isIssueFilled && hasImages) {
                submitBtn.disabled = false;
                submitBtn.className = "w-full flex justify-center items-center gap-2 bg-green-600 text-white py-3.5 rounded-xl font-bold hover:bg-green-700 transition duration-300 shadow-md shadow-green-600/20 active:scale-[0.98] cursor-pointer";
            } else {
                submitBtn.disabled = true;
                submitBtn.className = "w-full flex justify-center items-center gap-2 bg-slate-300 text-slate-500 py-3.5 rounded-xl font-bold transition duration-300 cursor-not-allowed";
            }
        }

        // Listen for typing in the fields to trigger validation
        locationInput.addEventListener('input', validateForm);
        issueInput.addEventListener('input', validateForm);


        // --- ADDITIVE IMAGE UPLOAD & REMOVAL LOGIC ---
        function renderFileTags() {
            const container = document.getElementById('fileTagsContainer');
            const badge = document.getElementById('photoCountBadge');
            
            container.innerHTML = ''; 
            badge.innerText = `${selectedFilesArray.length} / 5 Photos`;

            if (selectedFilesArray.length > 0) {
                container.classList.remove('hidden');
                selectedFilesArray.forEach((file, index) => {
                    container.innerHTML += `
                        <div class="flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 text-[10px] font-bold px-2.5 py-1.5 rounded-md max-w-[150px] shadow-sm">
                            <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="truncate">${file.name}</span>
                            <button type="button" onclick="removeFile(${index})" class="ml-1 text-red-400 hover:text-red-600 focus:outline-none transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    `;
                });
            } else {
                container.classList.add('hidden');
            }
        }

        // Global function to remove an image when the 'X' is clicked
        window.removeFile = function(index) {
            selectedFilesArray.splice(index, 1);
            renderFileTags();
            validateForm(); // Re-validate in case they deleted the last photo
        };

        // Handle new file selections additively
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const newFiles = Array.from(e.target.files);
            
            newFiles.forEach(file => {
                // Prevent exact duplicates
                const isDuplicate = selectedFilesArray.some(existingFile => existingFile.name === file.name && existingFile.size === file.size);
                
                if (!isDuplicate) {
                    if (selectedFilesArray.length < 5) {
                        selectedFilesArray.push(file);
                    } else {
                        alert("You can only upload a maximum of 5 photos per report.");
                    }
                }
            });

            // Reset the input so the user can select the same file again if they deleted it
            e.target.value = '';
            
            renderFileTags();
            validateForm();
        });


        // --- GPS AND FORM SUBMISSION ---
        window.getLocation = () => {
            const gpsBtn = document.getElementById('gpsBtn');
            gpsBtn.classList.add('animate-pulse', 'bg-amber-100', 'text-amber-600');
            
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    document.getElementById('lat').value = p.coords.latitude;
                    document.getElementById('lng').value = p.coords.longitude;
                    gpsBtn.classList.remove('animate-pulse', 'bg-amber-100', 'text-amber-600');
                    gpsBtn.classList.add('bg-green-100', 'text-green-600'); 
                },
                (err) => {
                    gpsBtn.classList.remove('animate-pulse', 'bg-amber-100', 'text-amber-600');
                    gpsBtn.classList.add('bg-red-100', 'text-red-600'); 
                    alert("Unable to get location. Please check your browser permissions.");
                }
            );
        };

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!activeUserId) return;

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            btn.disabled = true;
            btn.className = "w-full flex justify-center items-center gap-2 bg-slate-300 text-slate-500 py-3.5 rounded-xl font-bold transition duration-300 cursor-not-allowed";
            btnIcon.classList.add('hidden');
            btnText.innerHTML = "Processing...";

            try {
                let uploadedImageUrls = [];

                if (selectedFilesArray.length > 0) {
                    for (let i = 0; i < selectedFilesArray.length; i++) {
                        btnText.innerHTML = `Uploading Image ${i + 1} of ${selectedFilesArray.length}...`;
                        
                        const formData = new FormData();
                        formData.append("image", selectedFilesArray[i]);
                        
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: "POST",
                            body: formData
                        });
                        const data = await res.json();
                        
                        if(data.success) {
                            uploadedImageUrls.push(data.data.url); 
                        }
                    }
                }

                btnText.innerHTML = "Saving Report...";

                // Fetch user name if available
                let userName = "Anonymous";
                try {
                    const userDoc = await getDoc(doc(db, "users", activeUserId));
                    if (userDoc.exists()) {
                        userName = userDoc.data().fullName || "Anonymous";
                    }
                } catch (err) {
                    console.log("Could not fetch user name, using Anonymous");
                }

                await addDoc(collection(db, "reports"), {
                    userId: activeUserId,
                    reporterName: userName,
                    title: document.getElementById('category').value + " Issue",
                    location: document.getElementById('location').value,
                    issue: document.getElementById('issue').value,
                    category: document.getElementById('category').value,
                    images: uploadedImageUrls, 
                    lat: document.getElementById('lat').value || "",
                    lng: document.getElementById('lng').value || "",
                    status: "Pending",
                    createdAt: serverTimestamp()
                });

                document.getElementById('reportForm').reset();
                selectedFilesArray = [];
                renderFileTags();
                validateForm();
                
                const gpsBtn = document.getElementById('gpsBtn');
                gpsBtn.className = "absolute right-1 p-1.5 bg-slate-200 text-slate-600 rounded-lg hover:bg-green-100 hover:text-green-600 transition-colors";
                
                document.getElementById('successOverlay').classList.remove('hidden');

            } catch (error) {
                console.error("Report submission error:", error);
                alert("Report submission failed: " + error.message);
                btn.disabled = false;
                btn.className = "w-full flex justify-center items-center gap-2 bg-green-600 text-white py-3.5 rounded-xl font-bold hover:bg-green-700 transition duration-300 shadow-md shadow-green-600/20 active:scale-[0.98] cursor-pointer";
                btnIcon.classList.remove('hidden');
                btnText.innerHTML = "Submit Official Report";
            }
        };

        document.getElementById('closeModalBtn').onclick = () => {
            window.location.href = "userdashboard.html";
        };
    </script>
</body>
</html>
