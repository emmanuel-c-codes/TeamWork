<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoMonitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-gray-50">

    <div id="infoOverlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
            <h3 id="overlayTitle" class="font-black text-xl mb-2 text-slate-800"></h3>
            <p id="overlayMsg" class="text-sm text-slate-500 mb-6"></p>
            <button onclick="document.getElementById('infoOverlay').classList.add('hidden')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">Close</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 py-4">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
            <span class="font-bold text-xl text-green-600">EcoMonitor</span>
        </div>
        <div class="flex items-center gap-6 text-sm font-medium text-gray-600">
            <a href="index.html" class="hover:text-green-600 transition">Home</a>
            <a href="login.html" class="hover:text-green-600 transition">Login</a>
            <a href="#" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">Sign Up</a>
        </div>
    </nav>

    <main class="flex flex-col items-center justify-center min-h-[70vh] py-12 my-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Create your Account</h1>
            <p class="text-gray-600">Start your career readiness journey</p>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 w-full max-w-md">
            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="surname" required maxlength="25" placeholder="Surname" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                    <input type="text" id="firstname" required maxlength="25" placeholder="First Name" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <input type="text" id="middlename" maxlength="25" placeholder="Middle Name (Optional)" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                <input type="email" id="email" required placeholder="Email Address" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                <input type="password" id="password" required minlength="4" maxlength="6" placeholder="Password (4-6 characters)" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                
                <button type="submit" id="signupBtn" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 transition">Sign Up →</button>
            </form>

            <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div><div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-gray-500">OR</span></div></div>

            <button id="googleBtn" class="w-full border py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Continue with Google
            </button>
            
            <p class="text-center text-sm text-gray-600 mt-6">
                Already a member? <a href="login.html" class="text-green-600 font-semibold hover:underline">Login</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsDrW_Yy5KhODrWv4VhtZhMwqqsueWHhQ",
            authDomain: "myfirst-project-be8a6.firebaseapp.com",
            projectId: "myfirst-project-be8a6",
            storageBucket: "myfirst-project-be8a6.firebasestorage.app",
            messagingSenderId: "200529674375",
            appId: "1:200529674375:web:63ab761d5f7acbfc7f7822"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        function showOverlay(title, msg) {
            document.getElementById('overlayTitle').innerText = title;
            document.getElementById('overlayMsg').innerText = msg;
            document.getElementById('infoOverlay').classList.remove('hidden');
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            btn.disabled = true; btn.innerText = "Creating...";

            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                const fullName = `${document.getElementById('surname').value} ${document.getElementById('firstname').value} ${document.getElementById('middlename').value}`.trim();
                
                await setDoc(doc(db, "users", cred.user.uid), {
                    fullName: fullName,
                    email: document.getElementById('email').value,
                    profileCompleted: false,
                    createdAt: new Date().toISOString()
                });
                window.location.href = "userprofile2.html";
            } catch (err) {
                showOverlay("Signup Failed", err.code === 'auth/email-already-in-use' ? "Account already exists! Please login." : err.message);
                btn.disabled = false; btn.innerText = "Sign Up →";
            }
        });
    </script>
</body>
</html>
