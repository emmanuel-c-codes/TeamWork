<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Python Crash Course Quiz</title>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white w-full max-w-2xl p-6 rounded-xl shadow-lg">

  <!-- Header -->
  <div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">🐍 Python Crash Course Quiz</h1>
    <div class="text-red-500 font-bold">⏱️ <span id="timer">60</span>s</div>
  </div>

  <!-- Progress Bar -->
  <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
    <div id="progress" class="bg-blue-500 h-2 rounded-full w-0"></div>
  </div>

  <!-- Score -->
  <div class="flex justify-between mb-4 text-sm">
    <div>Score: <span id="score">0</span></div>
    <div>Question: <span id="qnum">1</span>/10</div>
  </div>

  <!-- Quiz Box -->
  <div id="quiz-box">

    <h2 id="question" class="text-lg font-semibold mb-4"></h2>

    <div id="options" class="space-y-2"></div>

    <div class="flex justify-between mt-4">
      <button onclick="prevQuestion()"
        class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
        ⬅ Back
      </button>

      <button onclick="nextQuestion()"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Next ➡
      </button>
    </div>

  </div>

  <!-- Result -->
  <div id="result" class="hidden text-center">
    <h2 class="text-2xl font-bold text-green-600">Quiz Completed 🎉</h2>
    <p class="mt-2 text-lg">Your final score:</p>
    <p class="text-3xl font-bold text-blue-600 mt-2" id="finalScore"></p>
  </div>

</div>

<script>
// 🔊 Sounds
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// 📘 10 QUESTIONS
let questions = [
  {q:"What is Python?", options:["Snake","Programming Language","Game","Browser"], answer:"Programming Language"},
  {q:"Keyword for function?", options:["func","define","def","function"], answer:"def"},
  {q:"Which symbol is comment?", options:["//","#","--","**"], answer:"#"},
  {q:"Data type of 10?", options:["String","Integer","Float","Boolean"], answer:"Integer"},
  {q:"Which is loop keyword?", options:["for","loop","repeat","iterate"], answer:"for"},
  {q:"Which stores multiple items?", options:["list","int","bool","char"], answer:"list"},
  {q:"Python file extension?", options:[".py",".pyt",".pt",".python"], answer:".py"},
  {q:"How to print in Python?", options:["echo","print()","console.log","write()"], answer:"print()"},
  {q:"Boolean values?", options:["yes/no","true/false","1/2","on/off"], answer:"true/false"},
  {q:"Which is correct variable?", options:["1name","name1","name-1","name 1"], answer:"name1"}
];

// 🔀 Shuffle
questions = questions.sort(() => Math.random() - 0.5);

let index = 0;
let score = 0;
let time = 60;

let selectedAnswers = Array(questions.length).fill(null);

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const qnumEl = document.getElementById("qnum");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  const q = questions[index];

  qnumEl.textContent = index + 1;
  questionEl.textContent = q.q;

  optionsEl.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "w-full p-2 border rounded hover:bg-gray-200";

    if (selectedAnswers[index] === opt) {
      btn.classList.add("bg-blue-100");
    }

    btn.onclick = () => {
      selectedAnswers[index] = opt;
      if (opt === q.answer) {
        correctSound.play();
      } else {
        wrongSound.play();
      }
      updateScore();
      loadQuestion();
    };

    optionsEl.appendChild(btn);
  });

  updateProgress();
}

function updateScore() {
  score = selectedAnswers.filter((ans, i) => ans === questions[i].answer).length;
  scoreEl.textContent = score;
}

function updateProgress() {
  let percent = ((index + 1) / questions.length) * 100;
  progressEl.style.width = percent + "%";
}

function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    endQuiz();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

function endQuiz() {
  document.getElementById("quiz-box").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("finalScore").textContent =
    `${score} / ${questions.length}`;
}

// ⏱️ Timer
const countdown = setInterval(() => {
  time--;
  timerEl.textContent = time;

  if (time <= 0) {
    clearInterval(countdown);
    endQuiz();
  }
}, 1000);

// Start
loadQuestion();
</script>

</body>
</html>
